# RTMP ingest (OBS) → HLS en transmux (pas de réencodage : adapté aux résolutions larges type 32:9).
# Lecture : http://127.0.0.1:8088/hls/live/<stream_key>/index.m3u8
# Note : "daemon off" est passé via -g dans la commande docker-compose.

error_log /dev/stdout info;

events {
    worker_connections 2048;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            allow publish all;
            deny play all;

            hls on;
            hls_path /opt/data/hls;
            hls_nested on;
            hls_fragment 3;
            hls_playlist_length 30;
            hls_fragment_naming system;
            hls_cleanup on;
            hls_sync 100ms;
        }
    }
}

http {
    sendfile off;
    tcp_nopush on;
    server_tokens off;
    access_log /dev/stdout combined;
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /opt/data;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            return 404;
        }
    }
}
