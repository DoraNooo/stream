<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Stream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --surface: #0e1117;
      --surface2: #151820;
      --border: rgba(255,255,255,.07);
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,.35);
      --red: #ff4560;
      --text: #e2e5f0;
      --muted: rgba(226,229,240,.45);
      --radius: 12px;
      --crop-ar: 32/9;
      --player-max-h: calc(100svh - 280px);
    }

    html { height: 100%; }
    body {
      min-height: 100svh;
      display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,17,23,.9); backdrop-filter: blur(12px);
    }
    .logo { display:flex; align-items:center; gap:.5rem; font-size:.95rem; font-weight:600; letter-spacing:-.01em; text-decoration:none; color:inherit; }
    .logo-dot { width:9px; height:9px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s,box-shadow .3s; }
    .logo-dot.live { background:var(--red); box-shadow:0 0 8px var(--red); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }
    .header-right { display:flex; align-items:center; gap:.6rem; }
    .badge { font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:.18rem .5rem; border-radius:20px; transition:all .3s; }
    .badge.offline { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
    .badge.online  { background:rgba(255,69,96,.15); color:var(--red); border:1px solid rgba(255,69,96,.25); }
    .mode-tag { font-size:.66rem; font-weight:600; padding:.16rem .48rem; border-radius:20px; border:1px solid var(--border); color:var(--muted); }
    .mode-tag.webrtc { background:rgba(108,99,255,.12); color:#a09bff; border-color:rgba(108,99,255,.2); }
    .mode-tag.hls    { background:rgba(255,180,0,.08); color:#ffc94d; border-color:rgba(255,180,0,.18); }

    /* ── Main ── */
    main {
      flex:1; display:flex; flex-direction:column; align-items:center;
      padding:.65rem 1rem .75rem; gap:.55rem;
      overflow-y: auto;
    }

    /* ── Player outer ─────────────────────────────────────────────────────────
       Ratio = crop choisi (JS → --crop-ar).
       Max-height = disponible après le chrome (JS → --player-max-h).
    ──────────────────────────────────────────────────────────────────────────*/
    .player-outer {
      flex-shrink: 0;
      position: relative;
      width: min(98vw, 130rem);
      aspect-ratio: var(--crop-ar);
      max-height: var(--player-max-h);
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.6);
      transition: aspect-ratio .3s cubic-bezier(.4,0,.2,1);
      -webkit-user-select: none;
      user-select: none;
    }
    /* Fenêtré : largeur bornée pour que hauteur ≤ --player-max-h (sinon 16:9 / 21:9 se confondent) */
    .player-outer.crop-fix-32 {
      aspect-ratio: 32/9;
      width: min(98vw, 130rem, calc(var(--player-max-h) * 32 / 9));
      height: auto;
    }
    .player-outer.crop-fix-21 {
      aspect-ratio: 21/9;
      width: min(98vw, 130rem, calc(var(--player-max-h) * 21 / 9));
      height: auto;
    }
    .player-outer.crop-fix-16 {
      aspect-ratio: 16/9;
      width: min(98vw, 130rem, calc(var(--player-max-h) * 16 / 9));
      height: auto;
    }

    /* ── Crop wrapper + vidéo ─────────────────────────────────────────────────
       Principe du crop :
       - .crop-wrapper prend toute la place du player-outer (100% × 100%).
       - La vidéo est positionnée en absolu, hauteur 100%, largeur AUTO.
         Le navigateur utilise son ratio intrinsèque (ex. 32:9) pour calculer
         la largeur → si le container est 16:9, la vidéo déborde en largeur
         et est centrée : le clip du wrapper masque les côtés → crop propre.
    ──────────────────────────────────────────────────────────────────────────*/
    .crop-wrapper {
      position: relative;
      z-index: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 21:9 & 16:9 — crop latéral centré : le cadre impose le ratio, le média couvre en gardant le sien */
    .player-outer.crop-fix-21 .crop-wrapper .crop-media,
    .player-outer.crop-fix-16 .crop-wrapper .crop-media {
      position: absolute;
      inset: 0;
      left: 0;
      top: 0;
      transform: none;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: cover;
      object-position: center;
    }
    /* 32:9 — tout le flux visible dans le cadre (bandes possibles si ratio ≠) */
    .player-outer.crop-fix-32 .crop-wrapper .crop-media {
      position: absolute;
      inset: 0;
      left: 0;
      top: 0;
      transform: none;
      width: 100%;
      height: 100%;
      aspect-ratio: unset;
      display: block;
      background: #000;
      object-fit: contain;
      object-position: center;
    }
    /* Auto — remplit la zone dispo, pas de bandes (crop si besoin), pas d’étirement */
    .player-outer.crop-auto .crop-wrapper .crop-media {
      position: absolute;
      inset: 0;
      left: 0;
      top: 0;
      transform: none;
      width: 100%;
      height: 100%;
      aspect-ratio: unset;
      display: block;
      background: #000;
      object-fit: cover;
      object-position: center;
    }
    .crop-wrapper #streamPlaceholder {
      pointer-events: none;
      user-select: none;
    }
    .player-outer.has-stream .crop-wrapper #streamPlaceholder {
      display: none;
    }

    /* Vignette (copie d’une zone du flux) — 21:9 / 16:9 seulement */
    .pip-canvas {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 8;
      max-width: min(240px, 30vw);
      max-height: min(38vh, 280px);
      width: auto;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 4px 20px rgba(0,0,0,.55);
      pointer-events: none;
      display: none;
      background: rgba(0,0,0,.35);
    }
    .pip-canvas.pip-canvas-visible { display: block; }

    /* ── Fullscreen ─────────────────────────────────────────────────────────
       player-outer remplit l'écran ; crop-wrapper prend le ratio choisi
       et se centre avec letterbox/pillarbox si l'écran a un autre ratio.
    ──────────────────────────────────────────────────────────────────────────*/
    .player-outer:fullscreen,
    .player-outer:-webkit-full-screen {
      width: 100vw !important; height: 100vh !important;
      max-height: none !important; aspect-ratio: auto !important;
      border-radius: 0 !important;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      /* Évite de clipper les overlays (format / contrôles) au-delà du wrapper vidéo */
      overflow: visible;
    }
    .player-outer:fullscreen:not(.crop-auto) .crop-wrapper,
    .player-outer:-webkit-full-screen:not(.crop-auto) .crop-wrapper {
      overflow: hidden;
      margin: 0 auto;
    }
    .player-outer:fullscreen.crop-fix-32:not(.crop-auto) .crop-wrapper,
    .player-outer:-webkit-full-screen.crop-fix-32:not(.crop-auto) .crop-wrapper {
      aspect-ratio: 32/9 !important;
      width: min(100vw, calc(100vh * 32 / 9));
      height: min(100vh, calc(100vw * 9 / 32));
      max-width: 100vw;
      max-height: 100vh;
    }
    /* 32:9 plein écran : forcer une composition alpha pour que le HUD HTML ne soit pas
       recouvert par une couche vidéo matérielle (Chrome / moniteurs ultra-larges). */
    .player-outer:fullscreen.crop-fix-32:not(.crop-auto) .crop-wrapper .crop-media,
    .player-outer:-webkit-full-screen.crop-fix-32:not(.crop-auto) .crop-wrapper .crop-media {
      opacity: 0.999;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .player-outer:fullscreen.crop-fix-21:not(.crop-auto) .crop-wrapper,
    .player-outer:-webkit-full-screen.crop-fix-21:not(.crop-auto) .crop-wrapper {
      aspect-ratio: 21/9 !important;
      width: min(100vw, calc(100vh * 21 / 9));
      height: min(100vh, calc(100vw * 9 / 21));
      max-width: 100vw;
      max-height: 100vh;
    }
    .player-outer:fullscreen.crop-fix-16:not(.crop-auto) .crop-wrapper,
    .player-outer:-webkit-full-screen.crop-fix-16:not(.crop-auto) .crop-wrapper {
      aspect-ratio: 16/9 !important;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      max-width: 100vw;
      max-height: 100vh;
    }
    /* Plein écran + Auto : tout l’écran, cover (pas de bandes) */
    .player-outer:fullscreen.crop-auto .crop-wrapper,
    .player-outer:-webkit-full-screen.crop-auto .crop-wrapper {
      width: 100vw !important; height: 100vh !important;
      max-width: none !important; max-height: none !important;
      aspect-ratio: auto !important;
      overflow: hidden;
    }
    .player-outer:fullscreen.crop-auto .crop-wrapper .crop-media,
    .player-outer:-webkit-full-screen.crop-auto .crop-wrapper .crop-media {
      inset: 0; left: 0; transform: none;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Auto (hors plein écran) : rectangle dispo max, cover */
    .player-outer.crop-auto {
      aspect-ratio: auto;
      width: min(98vw, 130rem);
      height: var(--player-max-h);
    }

    /* Calque HUD au-dessus de la vidéo (évite la couche matérielle qui masque les contrôles en 32:9 plein écran) */
    .player-chrome-layer {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      isolation: isolate;
      transform: translateZ(0);
    }

    /* Barre format en overlay (classe player-ui-visible) */
    .fs-crop-bar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 20;
      display: flex; align-items: center; gap: .35rem; flex-wrap: wrap; justify-content: center;
      max-width: calc(100% - 24px);
      padding: .35rem .5rem; border-radius: 10px;
      background: rgba(8,10,15,.72); border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      opacity: 0; transition: opacity .22s ease-out; pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .player-outer.player-ui-visible .fs-crop-bar {
      opacity: 1;
      pointer-events: auto;
    }
    .fs-crop-bar .crop-label { margin-right: .15rem; }
    .fs-crop-bar .crop-btn { font-size: .72rem; padding: .22rem .5rem; }

    /* ── Barre de contrôles custom ─────────────────────────────────────────
       Même logique que la barre format : visible si .player-ui-visible (souris / touch).
    ──────────────────────────────────────────────────────────────────────── */
    .ctrl-bar {
      position: absolute; bottom: 14px; right: 14px; z-index: 19;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 30px;
      background: rgba(8,10,15,.62); border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      opacity: 0; transition: opacity .22s ease-out;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .player-outer.player-ui-visible .ctrl-bar {
      opacity: 1;
      pointer-events: auto;
    }

    .ctrl-btn, .btn-fs {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: transparent; color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; padding: 0;
      transition: color .15s, background .15s;
    }
    .ctrl-btn:hover, .btn-fs:hover { color: #fff; background: rgba(255,255,255,.1); }

    /* Slider volume */
    .vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,.25); outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: #fff; cursor: pointer; box-shadow: 0 0 4px rgba(0,0,0,.4);
      transition: transform .15s;
    }
    .vol-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
    .vol-slider::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%; border: none;
      background: #fff; cursor: pointer;
    }

    .ctrl-sep { width: 1px; height: 16px; background: rgba(255,255,255,.15); flex-shrink: 0; }

    /* Overlay chargement — au-dessus du calque contrôles pendant chargement */
    .player-overlay {
      position: absolute; inset: 0; z-index: 60;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
      background: rgba(8,10,15,.78); transition: opacity .3s; pointer-events: none;
    }
    .player-overlay.hidden { opacity: 0; }
    .spinner { width:44px; height:44px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .overlay-label { font-size:.8rem; color:var(--muted); }

    /* ── Drag handle ── */
    .drag-handle {
      flex-shrink:0; width:min(98vw,130rem); height:14px;
      display:flex; align-items:center; justify-content:center;
      cursor:ns-resize; color:var(--muted); transition:color .2s; user-select:none;
    }
    .drag-handle:hover { color:var(--accent); }
    .drag-handle svg { pointer-events:none; }

    /* ── Barre Mode (Latence / Qualité) sous le lecteur ── */
    .mode-bar {
      flex-shrink: 0; width: min(98vw, 130rem);
      display: flex; align-items: center; gap: .45rem; flex-wrap: wrap;
      -webkit-user-select: none;
      user-select: none;
    }
    .crop-label { font-size:.7rem; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-right:.2rem; }
    .crop-btn {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.28rem .65rem; border-radius:6px;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--muted); font-size:.76rem; font-weight:600; cursor:pointer;
      transition:background .15s,color .15s,border-color .15s,box-shadow .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .crop-btn:hover { background:#1e2230; color:var(--text); }
    .crop-btn.active { background:rgba(108,99,255,.18); border-color:var(--accent); color:#c0bbff; box-shadow:0 0 0 2px var(--accent-glow); }
    .crop-icon { display:inline-block; border:1.5px solid currentColor; border-radius:2px; opacity:.8; flex-shrink:0; }

    .mode-sep { flex: 1; min-width: 6px; max-width: 20px; }
    /* ── Mode toggle (Latence / Qualité) ── */
    .mode-group { display:flex; align-items:center; gap:.3rem; }
    .scale-group { display:flex; align-items:center; gap:.28rem; flex-wrap:wrap; }
    .scale-btn {
      display:inline-flex; align-items:center; justify-content:center;
      min-width: 2.4rem;
      padding:.24rem .45rem; border-radius:6px;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--muted); font-size:.72rem; font-weight:600; cursor:pointer;
      transition:background .15s,color .15s,border-color .15s,box-shadow .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .scale-btn:hover:not(:disabled) { background:#1e2230; color:var(--text); }
    .scale-btn.active { background:rgba(108,99,255,.14); border-color:var(--accent); color:#c0bbff; box-shadow:0 0 0 2px var(--accent-glow); }
    .scale-btn:disabled { opacity:.35; cursor:not-allowed; }
    .mode-bar.scale-locked .scale-group { opacity:.42; pointer-events:none; }
    .mode-group-label { font-size:.7rem; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-right:.2rem; }
    .mode-btn {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.28rem .65rem; border-radius:6px;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--muted); font-size:.76rem; font-weight:600; cursor:pointer;
      transition:background .15s,color .15s,border-color .15s,box-shadow .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .mode-btn:hover { background:#1e2230; color:var(--text); }
    .mode-btn.active-latency { background:rgba(108,99,255,.18); border-color:var(--accent); color:#c0bbff; box-shadow:0 0 0 2px var(--accent-glow); }
    .mode-btn.active-quality { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.4); color:#86efac; box-shadow:0 0 0 2px rgba(34,197,94,.2); }

    /* ── Panel clé ── */
    .panel {
      flex-shrink:0; width:min(98vw,130rem); background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      padding:.8rem 1.1rem; display:flex; flex-wrap:wrap; gap:.6rem; align-items:center;
    }
    .panel label { font-size:.73rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    .input-row { display:flex; flex:1; gap:.45rem; min-width:0; }
    input[type="text"] {
      flex:1; min-width:0; padding:.48rem .75rem;
      border-radius:7px; border:1px solid var(--border);
      background:var(--surface2); color:var(--text); font-size:.86rem;
      outline:none; transition:border-color .2s,box-shadow .2s;
    }
    input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    input[type="text"]::placeholder { color:var(--muted); }
    .btn { display:inline-flex; align-items:center; gap:.35rem; padding:.48rem .95rem; border-radius:7px; border:none; font-size:.86rem; font-weight:600; cursor:pointer; transition:background .15s,transform .1s,box-shadow .2s; white-space:nowrap; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:0 3px 12px rgba(108,99,255,.3); }
    .btn-primary:hover { background:#7b73ff; box-shadow:0 3px 16px rgba(108,99,255,.5); transform:translateY(-1px); }
    .btn-primary:active { transform:translateY(0); }

    /* ── Vignette (coords source) ── */
    .pip-panel {
      flex-shrink: 0;
      width: min(98vw, 130rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem 1rem .75rem;
    }
    .pip-panel-head { margin-bottom: .45rem; }
    .pip-panel-title {
      font-size: .73rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
    }
    .pip-panel-hint {
      font-size: .68rem;
      color: var(--muted);
      opacity: .85;
      display: block;
      margin-top: .15rem;
    }
    .pip-inputs {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .45rem .65rem;
    }
    .pip-inputs label {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .pip-inputs input[type="text"] {
      width: 4.5rem;
      flex: 0 0 auto;
      padding: .35rem .45rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: .8rem;
    }

    /* ── Status bar ── */
    .status-bar { flex-shrink:0; width:min(98vw,130rem); font-size:.78rem; display:flex; align-items:center; gap:.45rem; padding:.45rem .8rem; border-radius:7px; border:1px solid transparent; transition:opacity .25s; }
    .status-bar.hidden { opacity:0; pointer-events:none; height:0; padding:0; overflow:hidden; border:none; }
    .status-bar.error { background:rgba(255,69,96,.08); border-color:rgba(255,69,96,.2); color:#ff7a91; }
    .status-bar.info  { background:rgba(108,99,255,.08); border-color:rgba(108,99,255,.2); color:#a09bff; }

    /* ── Footer ── */
    footer { flex-shrink:0; padding:.55rem 1.4rem; border-top:1px solid var(--border); font-size:.7rem; color:var(--muted); text-align:center; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/"><span class="logo-dot" id="liveDot"></span>Live Stream</a>
  <div class="header-right">
    <span class="mode-tag" id="modeTag">—</span>
    <span class="badge offline" id="liveBadge">Hors ligne</span>
  </div>
</header>

<main>
  <div class="player-outer crop-fix-32" id="playerOuter">
    <div class="crop-wrapper">
      <!-- Pas de controls natifs : on gère son + fullscreen en custom -->
      <video id="v" class="crop-media" playsinline autoplay></video>
      <img id="streamPlaceholder" class="crop-media" src="placeholder-ultrawide.png" alt="" decoding="async" width="2560" height="720" />
      <canvas id="pipCanvas" class="pip-canvas" width="2" height="2" aria-hidden="true"></canvas>
    </div>

    <div class="player-overlay hidden" id="overlay">
      <div class="spinner"></div>
      <span class="overlay-label" id="overlayLabel">En attente du flux…</span>
    </div>

    <!-- Calque HUD : au-dessus de la vidéo (z-index + composition) -->
    <div class="player-chrome-layer" id="playerChromeLayer">
      <div class="ctrl-bar">
      <!-- Son -->
      <button class="ctrl-btn" id="muteBtn" title="Couper / activer le son">
        <svg id="volIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>

      <div class="fs-crop-bar" id="fsCropBar" aria-label="Format d’affichage">

  <div class="pip-panel" id="pipPanel">
    <div class="pip-panel-head">
      <span class="pip-panel-title">Vignette (minimap)</span>

    </div>
    <div class="pip-inputs">
      <label>Sup gauche X <input id="pipTLx" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="0" /></label>
      <label>Y <input id="pipTLy" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="0" /></label>
      <label>Inf droite X <input id="pipBRx" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="0" /></label>
      <label>Y <input id="pipBRy" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="0" /></label>
    </div>

  <div class="panel">
    <label for="key">Clé de stream</label>
    <div class="input-row">
      <input id="key" type="text" placeholder="ex : test (auto ll- / hq- selon le mode)" autocomplete="off" spellcheck="false" />
      <button type="button" class="btn btn-primary" id="go">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5a.5.5 0 0 1 .765-.424l10 5.5a.5.5 0 0 1 0 .848l-10 5.5A.5.5 0 0 1 3 13.5v-11Z"/></svg>
        Lancer

  <div class="status-bar hidden" id="statusBar"></div>
</main>

<footer>stream.barium-saas.fr &mdash; <span id="footerMode">WebRTC &lt;1 s</span> · HLS Qualité disponible</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
<script>
(function () {
  const video       = document.getElementById('v');
  const keyInput    = document.getElementById('key');
  const statusBar   = document.getElementById('statusBar');
  const overlay     = document.getElementById('overlay');
  const overlayLbl  = document.getElementById('overlayLabel');
  const liveBadge   = document.getElementById('liveBadge');
  const liveDot     = document.getElementById('liveDot');
  const modeTag     = document.getElementById('modeTag');
  const playerOuter = document.getElementById('playerOuter');
  const root        = document.documentElement;

  function getFullscreenElement() {
    return document.fullscreenElement || document.webkitFullscreenElement;
  }

  const PLAYER_UI_HIDE_MS = 1400;
  let playerUiHideTimer = null;
  function clearPlayerUiHideTimer() {
    if (playerUiHideTimer) {
      clearTimeout(playerUiHideTimer);
      playerUiHideTimer = null;
    }
  }
  function hidePlayerChrome() {
    clearPlayerUiHideTimer();
    playerOuter.classList.remove('player-ui-visible');
  }
  function bumpPlayerUiChrome() {
    playerOuter.classList.add('player-ui-visible');
    clearPlayerUiHideTimer();
    playerUiHideTimer = setTimeout(hidePlayerChrome, PLAYER_UI_HIDE_MS);
  }
  function onGlobalPointerActivity(ev) {
    const fsEl = getFullscreenElement();
    if (fsEl === playerOuter) {
      bumpPlayerUiChrome();
      return;
    }
    if (playerOuter.contains(ev.target)) bumpPlayerUiChrome();
  }

  document.addEventListener('mousemove', onGlobalPointerActivity, { passive: true });
  document.addEventListener('pointermove', onGlobalPointerActivity, { passive: true });
  document.addEventListener('touchstart', onGlobalPointerActivity, { passive: true });
  playerOuter.addEventListener('mouseleave', () => {
    if (getFullscreenElement() !== playerOuter) hidePlayerChrome();
  });

  let hlsInstance = null;
  let pc = null;
  let forceHLS = false; // true = mode Qualité
  /** 100 = natif ll- ; 90/80/70 = llsq* (transcodage serveur, WebRTC seulement) */
  let resolutionPct = 100;

  // ── Chrome height dynamique ────────────────────────────────────────────────
  function updateChromeH() {
    const els = ['header', '.drag-handle', '.mode-bar', '.pip-panel', '.panel', 'footer'];
    const chromeH = els.reduce((h, sel) => {
      const el = document.querySelector(sel);
      return h + (el ? el.offsetHeight : 0);
    }, 0);
    const mainPad = 24; // top + bottom padding de main
    const gaps = 5 * 8; // ~5 gaps de 8px
    root.style.setProperty('--player-max-h', `calc(100svh - ${chromeH + mainPad + gaps}px)`);
  }
  updateChromeH();
  window.addEventListener('resize', updateChromeH);

  // ── Crop (overlay sur le lecteur) ─────────────────────────────────────────
  function cropBtnKey(btn) {
    if (!btn) return '';
    if (btn.dataset.crop === 'auto') return 'auto';
    if (btn.dataset.w != null && btn.dataset.h != null) return `${btn.dataset.w}/${btn.dataset.h}`;
    return '';
  }
  function syncCropActive(activeBtn) {
    const key = cropBtnKey(activeBtn);
    document.querySelectorAll('.crop-btn').forEach(b => {
      b.classList.toggle('active', cropBtnKey(b) === key);
    });
  }
  function applyCropFromButton(btn) {
    if (!btn) return;
    playerOuter.classList.remove('crop-auto', 'crop-fix-32', 'crop-fix-21', 'crop-fix-16');
    if (btn.dataset.crop === 'auto') {
      playerOuter.classList.add('crop-auto');
    } else {
      root.style.setProperty('--crop-ar', `${btn.dataset.w}/${btn.dataset.h}`);
      if (btn.dataset.w === '32') playerOuter.classList.add('crop-fix-32');
      else if (btn.dataset.w === '21') playerOuter.classList.add('crop-fix-21');
      else if (btn.dataset.w === '16') playerOuter.classList.add('crop-fix-16');
    }
    syncCropActive(btn);
    updateChromeH();
    syncPipLoop();
  }
  const fsCropBar = document.getElementById('fsCropBar');
  fsCropBar.addEventListener('mousedown', e => {
    if (e.target.closest('.crop-btn')) e.preventDefault();
  });
  fsCropBar.addEventListener('click', e => {
    bumpPlayerUiChrome();
    const btn = e.target.closest('.crop-btn');
    if (!btn) return;
    applyCropFromButton(btn);
  });

  // ── Vignette (copie d’une zone du flux → canvas, 21:9 / 16:9) ──────────────
  const pipCanvas = document.getElementById('pipCanvas');
  const pipCtx = pipCanvas.getContext('2d');
  const pipTLx = document.getElementById('pipTLx');
  const pipTLy = document.getElementById('pipTLy');
  const pipBRx = document.getElementById('pipBRx');
  const pipBRy = document.getElementById('pipBRy');
  const LS_PIP = 'streamPipRect';

  function pipParseInt(el) {
    const n = parseInt(String(el.value || '').trim(), 10);
    return Number.isFinite(n) ? n : NaN;
  }
  function pipCropModeActive() {
    return playerOuter.classList.contains('crop-fix-21') || playerOuter.classList.contains('crop-fix-16');
  }
  function normalizedPipSourceRect() {
    const vw = video.videoWidth | 0;
    const vh = video.videoHeight | 0;
    if (vw < 16 || vh < 16) return null;
    const x1 = pipParseInt(pipTLx);
    const y1 = pipParseInt(pipTLy);
    const x2 = pipParseInt(pipBRx);
    const y2 = pipParseInt(pipBRy);
    if ([x1, y1, x2, y2].some(Number.isNaN)) return null;
    let sx = Math.min(x1, x2);
    let sy = Math.min(y1, y2);
    let sw = Math.abs(x2 - x1);
    let sh = Math.abs(y2 - y1);
    if (sw < 8 || sh < 8) return null;
    if (sx >= vw || sy >= vh) return null;
    sx = Math.max(0, sx);
    sy = Math.max(0, sy);
    sw = Math.min(sw, vw - sx);
    sh = Math.min(sh, vh - sy);
    if (sw < 8 || sh < 8) return null;
    return { sx, sy, sw, sh };
  }
  function savePipToLs() {
    try {
      localStorage.setItem(LS_PIP, JSON.stringify({
        tlx: pipTLx.value,
        tly: pipTLy.value,
        brx: pipBRx.value,
        bry: pipBRy.value,
      }));
    } catch (e) { /* ignore */ }
  }
  function loadPipFromLs() {
    try {
      const j = JSON.parse(localStorage.getItem(LS_PIP) || 'null');
      if (!j || typeof j !== 'object') return;
      if (j.tlx != null) pipTLx.value = String(j.tlx);
      if (j.tly != null) pipTLy.value = String(j.tly);
      if (j.brx != null) pipBRx.value = String(j.brx);
      if (j.bry != null) pipBRy.value = String(j.bry);
    } catch (e) { /* ignore */ }
  }

  let pipLoopWanted = false;
  let pipVfcId = null;
  let pipRafId = null;

  function stopPipLoop() {
    pipLoopWanted = false;
    if (pipVfcId != null && typeof video.cancelVideoFrameCallback === 'function') {
      video.cancelVideoFrameCallback(pipVfcId);
    }
    pipVfcId = null;
    if (pipRafId != null) cancelAnimationFrame(pipRafId);
    pipRafId = null;
  }

  function pipVfcHandler() {
    if (!pipLoopWanted) return;
    tickPip();
    if (pipLoopWanted && typeof video.requestVideoFrameCallback === 'function') {
      pipVfcId = video.requestVideoFrameCallback(pipVfcHandler);
    }
  }
  function pipRafHandler() {
    if (!pipLoopWanted) return;
    tickPip();
    if (pipLoopWanted) pipRafId = requestAnimationFrame(pipRafHandler);
  }

  function startPipLoop() {
    if (pipLoopWanted) return;
    pipLoopWanted = true;
    if (typeof video.requestVideoFrameCallback === 'function') {
      pipVfcId = video.requestVideoFrameCallback(pipVfcHandler);
    } else {
      pipRafId = requestAnimationFrame(pipRafHandler);
    }
  }

  function tickPip() {
    if (!pipLoopWanted) return;
    if (!playerOuter.classList.contains('has-stream')) {
      pipCanvas.classList.remove('pip-canvas-visible');
      return;
    }
    if (!pipCropModeActive()) {
      pipCanvas.classList.remove('pip-canvas-visible');
      return;
    }
    if (video.readyState < 2) {
      pipCanvas.classList.remove('pip-canvas-visible');
      return;
    }
    const r = normalizedPipSourceRect();
    if (!r) {
      pipCanvas.classList.remove('pip-canvas-visible');
      return;
    }
    const wrap = pipCanvas.parentElement;
    if (!wrap) return;
    const maxCssW = Math.min(240, Math.max(80, wrap.clientWidth * 0.28));
    const scale = maxCssW / r.sw;
    const outW = Math.max(48, Math.round(r.sw * scale));
    const outH = Math.max(48, Math.round(r.sh * scale));
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    pipCanvas.style.width = outW + 'px';
    pipCanvas.style.height = outH + 'px';
    const bw = Math.max(1, Math.round(outW * dpr));
    const bh = Math.max(1, Math.round(outH * dpr));
    if (pipCanvas.width !== bw || pipCanvas.height !== bh) {
      pipCanvas.width = bw;
      pipCanvas.height = bh;
    }
    pipCtx.setTransform(1, 0, 0, 1, 0, 0);
    pipCtx.clearRect(0, 0, bw, bh);
    pipCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    try {
      pipCtx.drawImage(video, r.sx, r.sy, r.sw, r.sh, 0, 0, outW, outH);
    } catch (e) {
      pipCanvas.classList.remove('pip-canvas-visible');
      return;
    }
    pipCtx.setTransform(1, 0, 0, 1, 0, 0);
    pipCanvas.classList.add('pip-canvas-visible');
  }

  function syncPipLoop() {
    stopPipLoop();
    pipCanvas.classList.remove('pip-canvas-visible');
    if (!playerOuter.classList.contains('has-stream')) return;
    if (!pipCropModeActive()) return;
    if (!normalizedPipSourceRect()) return;
    startPipLoop();
  }

  [pipTLx, pipTLy, pipBRx, pipBRy].forEach(el => {
    el.addEventListener('input', () => { savePipToLs(); syncPipLoop(); });
    el.addEventListener('change', () => { savePipToLs(); syncPipLoop(); });
  });
  video.addEventListener('loadeddata', syncPipLoop);
  video.addEventListener('emptied', syncPipLoop);
  window.addEventListener('resize', () => { if (pipLoopWanted) tickPip(); });
  loadPipFromLs();

  const modeBar = document.getElementById('modeBar');
  modeBar.addEventListener('mousedown', e => {
    if (e.target.closest('.mode-btn') || e.target.closest('.scale-btn')) e.preventDefault();
  });

  // ── Drag resize ───────────────────────────────────────────────────────────
  const dragHandle = document.getElementById('dragHandle');
  let resizing = false, dragStartY = 0, dragStartH = 0;

  dragHandle.addEventListener('pointerdown', e => {
    resizing   = true;
    dragStartY = e.clientY;
    dragStartH = playerOuter.getBoundingClientRect().height;
    dragHandle.setPointerCapture(e.pointerId);
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  dragHandle.addEventListener('pointermove', e => {
    if (!resizing) return;
    const newH = Math.max(80, dragStartH + (e.clientY - dragStartY));
    root.style.setProperty('--player-max-h', newH + 'px');
  });
  dragHandle.addEventListener('pointerup', () => {
    resizing = false;
    document.body.style.userSelect = '';
  });

  // ── Son ───────────────────────────────────────────────────────────────────
  const volSlider = document.getElementById('volSlider');
  const volIcon   = document.getElementById('volIcon');

  const SVG_VOL_ON  = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`;
  const SVG_VOL_OFF = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;

  function updateVolIcon() {
    volIcon.innerHTML = (video.muted || video.volume === 0) ? SVG_VOL_OFF : SVG_VOL_ON;
    // Filled track via gradient
    const pct = video.muted ? 0 : Math.round(video.volume * 100);
    volSlider.style.background = `linear-gradient(to right, #fff ${pct}%, rgba(255,255,255,.25) ${pct}%)`;
  }

  document.getElementById('muteBtn').addEventListener('click', () => {
    video.muted = !video.muted;
    if (video.muted) volSlider.value = 0;
    else             volSlider.value = video.volume || 1;
    updateVolIcon();
    bumpPlayerUiChrome();
  });

  volSlider.addEventListener('input', () => {
    video.volume = parseFloat(volSlider.value);
    video.muted  = video.volume === 0;
    updateVolIcon();
    bumpPlayerUiChrome();
  });

  // Initialise l'icône une fois le flux démarré
  video.addEventListener('volumechange', updateVolIcon);
  updateVolIcon();

  // ── Fullscreen + icône ────────────────────────────────────────────────────
  const SVG_FS_EXPAND = `<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>`;
  const SVG_FS_SHRINK = `<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>`;

  function syncFsIcon() {
    document.getElementById('fsIcon').innerHTML =
      getFullscreenElement() === playerOuter ? SVG_FS_SHRINK : SVG_FS_EXPAND;
  }

  document.getElementById('btnFs').addEventListener('click', () => {
    bumpPlayerUiChrome();
    if (getFullscreenElement() !== playerOuter) {
      const req = playerOuter.requestFullscreen || playerOuter.webkitRequestFullscreen;
      if (req) req.call(playerOuter).catch(() => {});
    } else {
      const ex = document.exitFullscreen || document.webkitExitFullscreen;
      if (ex) ex.call(document).catch(() => {});
    }
  });

  function onFullscreenTransition() {
    syncFsIcon();
    if (getFullscreenElement() === playerOuter) {
      bumpPlayerUiChrome();
      requestAnimationFrame(() => bumpPlayerUiChrome());
    } else hidePlayerChrome();
  }
  document.addEventListener('fullscreenchange', onFullscreenTransition);
  document.addEventListener('webkitfullscreenchange', onFullscreenTransition);

  // ── UI ────────────────────────────────────────────────────────────────────
  function setStatus(type, text) {
    if (!text) { statusBar.className = 'status-bar hidden'; return; }
    statusBar.className = 'status-bar ' + type;
    statusBar.textContent = text;
  }
  function setLive(live, mode) {
    liveBadge.textContent = live ? 'En direct' : 'Hors ligne';
    liveBadge.className   = live ? 'badge online' : 'badge offline';
    liveDot.className     = live ? 'logo-dot live' : 'logo-dot';
    modeTag.textContent   = mode || '—';
    modeTag.className     = 'mode-tag' + (mode === 'WebRTC' ? ' webrtc' : mode === 'HLS' ? ' hls' : '');
    playerOuter.classList.toggle('has-stream', !!live);
    syncPipLoop();
  }
  function showOverlay(label) { overlay.classList.remove('hidden'); overlayLbl.textContent = label || ''; }
  function hideOverlay()       { overlay.classList.add('hidden'); }

  // ── Clé stream (auto ll-/hq-) ─────────────────────────────────────────────
  function normalizeBaseKey(input) {
    let k = (input || '').trim();
    if (!k) return '';
    if (k.startsWith('publish:')) k = k.slice('publish:'.length);
    if (k.startsWith('live/'))    k = k.slice('live/'.length);
    if (k.startsWith('hqc-')) k = k.slice('hqc-'.length);
    else if (k.startsWith('ll-') || k.startsWith('hq-')) k = k.slice(3);
    else if (/^llsq(90|80|70)-/i.test(k)) k = k.replace(/^llsq(90|80|70)-/i, '');
    return k.trim();
  }
  function resolvePathKey(input) {
    const base = normalizeBaseKey(input);
    if (!base) return '';
    // Qualité : HLS lit le relais remuxé live/hqc-<base> (voir deploy/mediamtx.yml).
    if (forceHLS) return 'hqc-' + base;
    // Latence : 100 % = flux natif ; 90/80/70 % = transcoding on-demand (voir deploy/mediamtx.yml).
    if (resolutionPct === 100) return 'll-' + base;
    return 'llsq' + resolutionPct + '-' + base;
  }

  function syncScaleUi() {
    document.querySelectorAll('.scale-btn').forEach(b => {
      const n = parseInt(b.dataset.scale, 10);
      b.classList.toggle('active', n === resolutionPct);
    });
  }

  // ── Cleanup ───────────────────────────────────────────────────────────────
  function stopAll() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (pc)          { pc.close();            pc = null; }
    video.srcObject = null;
    video.src = '';
    setLive(false, null);
  }

  // ── WebRTC / WHEP ─────────────────────────────────────────────────────────
  async function playWebRTC(key) {
    const whepUrl = '/webrtc/live/' + encodeURIComponent(key) + '/whep';
    pc = new RTCPeerConnection({ iceServers: [] });
    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = e => {
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
        video.play().catch(() => {});
        hideOverlay();
        setLive(true, 'WebRTC');
        setStatus('info', 'WebRTC actif — latence <1 s.');
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (['disconnected', 'failed', 'closed'].includes(pc.iceConnectionState)) {
        setLive(false, null);
        setStatus('error', 'Connexion WebRTC perdue.');
        showOverlay('Connexion perdue…');
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await new Promise(resolve => {
      if (pc.iceGatheringState === 'complete') { resolve(); return; }
      pc.addEventListener('icegatheringstatechange', function h() {
        if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', h); resolve(); }
      });
      setTimeout(resolve, 2000);
    });

    const resp = await fetch(whepUrl, {
      method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: pc.localDescription.sdp,
    });
    if (!resp.ok) throw new Error('WHEP ' + resp.status);
    await pc.setRemoteDescription({ type: 'answer', sdp: await resp.text() });
  }

  // ── HLS ───────────────────────────────────────────────────────────────────
  function playHLS(key, qualityMode) {
    const src = '/hls/' + encodeURIComponent(key) + '/index.m3u8';
    const hlsCfg = qualityMode
      ? { liveDurationInfinity: true, lowLatencyMode: false, backBufferLength: 30, maxLiveSyncPlaybackRate: 1.0 }
      : { liveDurationInfinity: true, lowLatencyMode: true,  backBufferLength: 8,  maxLiveSyncPlaybackRate: 1.1 };
    const label  = qualityMode ? 'HLS Qualité (~4-6 s).' : 'HLS Low-Latency (~2 s).';
    if (window.Hls && window.Hls.isSupported()) {
      hlsInstance = new window.Hls(hlsCfg);
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(video);
      hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {}); hideOverlay(); setLive(true, 'HLS'); setStatus('info', label);
      });
      hlsInstance.on(window.Hls.Events.ERROR, (_, d) => {
        if (d.fatal) { setLive(false, null); setStatus('error', 'Flux HLS indisponible.'); showOverlay('Flux indisponible'); }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src; video.play().catch(() => {}); hideOverlay(); setLive(true, 'HLS');
    } else {
      setStatus('error', 'Navigateur incompatible. Essaie Chrome ou Safari.'); showOverlay('Navigateur incompatible');
    }
  }

  // ── Entrée principale ─────────────────────────────────────────────────────
  async function play(key) {
    stopAll(); setStatus('');
    const base = normalizeBaseKey(keyInput.value);
    const hlsLatencyFallbackKey = 'll-' + base;
    if (forceHLS) {
      showOverlay('Chargement HLS Qualité…');
      playHLS(key, true);
      return;
    }
    showOverlay(
      resolutionPct < 100
        ? 'Connexion WebRTC (transcodage ' + resolutionPct + ' % source)…'
        : 'Connexion WebRTC…'
    );
    try {
      await playWebRTC(key);
    } catch (err) {
      console.warn('WebRTC échoué, bascule HLS:', err);
      setStatus('info', 'WebRTC indisponible — bascule HLS (~2 s).');
      showOverlay('Bascule HLS…');
      if (pc) { pc.close(); pc = null; }
      playHLS(hlsLatencyFallbackKey, false);
    }
  }

  // ── Toggle Latence / Qualité ───────────────────────────────────────────────
  const btnModeLow = document.getElementById('btnModeLow');
  const btnModeHQ  = document.getElementById('btnModeHQ');

  function setMode(hq) {
    forceHLS = hq;
    btnModeLow.className = 'mode-btn' + (hq ? '' : ' active-latency');
    btnModeHQ.className  = 'mode-btn' + (hq ? ' active-quality' : '');
    modeBar.classList.toggle('scale-locked', hq);
    updateUrl();
    // Si un stream est en cours, relancer avec le nouveau mode
    const k = resolvePathKey(keyInput.value);
    if (k && (hlsInstance || pc)) play(k);
  }

  btnModeLow.addEventListener('click', () => setMode(false));
  btnModeHQ.addEventListener('click',  () => setMode(true));

  modeBar.addEventListener('click', e => {
    const sb = e.target.closest('.scale-btn');
    if (!sb || forceHLS) return;
    const p = parseInt(sb.dataset.scale, 10);
    if (![100, 90, 80, 70].includes(p) || p === resolutionPct) return;
    resolutionPct = p;
    syncScaleUi();
    updateUrl();
    const k = resolvePathKey(keyInput.value);
    if (k && (hlsInstance || pc)) play(k);
  });

  function updateUrl() {
    const k = normalizeBaseKey(keyInput.value);
    const params = new URLSearchParams();
    if (k) params.set('key', k);
    if (forceHLS) params.set('mode', 'quality');
    else if (resolutionPct !== 100) params.set('scale', String(resolutionPct));
    const qs = params.toString();
    history.replaceState(null, '', qs ? '?' + qs : location.pathname);
  }

  document.getElementById('go').addEventListener('click', () => {
    const raw = keyInput.value.trim();
    const k = resolvePathKey(raw);
    if (!k) { setStatus('error', 'Saisis une clé de stream.'); return; }
    keyInput.value = normalizeBaseKey(raw);
    updateUrl();
    play(k);
  });

  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('go').click(); });

  // Restaurer depuis l'URL
  const qp = new URLSearchParams(location.search);
  const q  = qp.get('key');
  const qm = qp.get('mode');
  const qs = qp.get('scale');
  if (qs === '90' || qs === '80' || qs === '70') {
    resolutionPct = parseInt(qs, 10);
    syncScaleUi();
  }
  if (qm === 'quality') setMode(true);
  if (q) { keyInput.value = normalizeBaseKey(q); play(resolvePathKey(q)); }
  else { hideOverlay(); }
})();
</script>
</body>
</html>
