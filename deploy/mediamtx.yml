# mediamtx v1.18+ — RTMP ingest → WebRTC (WHEP) + HLS fallback

logLevel: info
logDestinations: [stdout]

# ── Adresses d'écoute ─────────────────────────────────────────────────────────
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889

# ── HLS ───────────────────────────────────────────────────────────────────────
# lowLatency (LL-HLS) peut rester bloqué sans playlist sur x264 + B-frames (hq-*).
# fmp4 = segments classiques, tolérant ; latence un peu plus haute (OK pour mode Qualité).
hlsAllowOrigins: ["*"]
hlsVariant: fmp4
hlsAlwaysRemux: true
hlsSegmentCount: 10
hlsSegmentDuration: 2s

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAllowOrigins: ["*"]
# IP publique du VPS — nécessaire pour les ICE candidates externes
webrtcAdditionalHosts: [178.105.48.96]
# Port UDP fixe pour ICE (exposé dans docker-compose + UFW)
webrtcLocalUDPAddress: :8189

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  # Mode LATENCE uniquement :
  # flux envoyés vers live/ll-<clé>
  # → ffmpeg lit le flux RTSP et le re-publie dans webrtc/live/ll-<clé>
  #   avec l'audio transcodé en Opus (compatible WebRTC).
  # Mode QUALITE (live/hq-<clé>) ne passe PAS ici, reste en HLS pur.
  "~^live/ll-.+$":
    runOnReady: >-
      sh -c "sleep 3; exec ffmpeg -loglevel warning
      -rtsp_transport tcp
      -analyzeduration 15000000
      -probesize 50000000
      -i rtsp://127.0.0.1:8554/$MTX_PATH
      -map 0:v:0 -map 0:a:0
      -c:v copy
      -c:a libopus -b:a 128k -ar 48000
      -f rtsp -rtsp_transport tcp -flush_packets 1
      rtsp://127.0.0.1:8554/webrtc/$MTX_PATH"
    runOnReadyRestart: yes

  all_others:
