# Nginx host — stream.barium-saas.fr
# Prérequis : certbot --nginx -d stream.barium-saas.fr
# Conteneur mediamtx : HLS sur 127.0.0.1:8888, WebRTC signaling sur 127.0.0.1:8889
# ICE UDP 8189 exposé directement (pas proxy Nginx)

server {
    listen 443 ssl http2;
    server_name stream.barium-saas.fr;

    # ssl_certificate /etc/letsencrypt/live/stream.barium-saas.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/stream.barium-saas.fr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/stream-player;

    # ── Lecteur HTML ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebRTC WHEP signaling (POST SDP) ─────────────────────────────────────
    location /live/ {
        proxy_pass http://127.0.0.1:8889/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        # WHEP nécessite des réponses rapides, pas de timeout long
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PATCH";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, If-Match";
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── HLS fallback ─────────────────────────────────────────────────────────
    location /hls/ {
        proxy_pass http://127.0.0.1:8888/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }
}

server {
    listen 80;
    server_name stream.barium-saas.fr;
    return 301 https://$host$request_uri;
}
