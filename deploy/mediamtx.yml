# mediamtx v1.18+ — RTMP ingest → WebRTC (WHEP) + HLS fallback

logLevel: info
logDestinations: [stdout]

# ── Adresses d'écoute ─────────────────────────────────────────────────────────
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889

# ── HLS ───────────────────────────────────────────────────────────────────────
# mpegts + segments 2s : robuste pour les relais ffmpeg et les GOP OBS (keyframes 2s).
hlsAllowOrigins: ["*"]
hlsVariant: mpegts
hlsAlwaysRemux: false
hlsSegmentCount: 10
hlsSegmentDuration: 2s

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAllowOrigins: ["*"]
# IPs / noms joignables depuis Internet (ICE host). Ajoute le hostname HTTPS si utile.
webrtcAdditionalHosts:
  - 178.105.48.96
  - stream.barium-saas.fr
# ICE UDP (efficace) + ICE TCP (souvent indispensable sur 4G / Mi Browser quand l’UDP est filtré).
# Ouvre 8189/udp ET 8189/tcp sur le pare-feu du VPS (voir docker-compose).
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
# STUN partagé serveur + clients (hole punching). Si encore bloqué → TURN (coturn), voir doc MediaMTX.
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  - url: stun:stun1.l.google.com:19302

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  # Latence — renditions ~90/80/70 % de la taille source (transcodage x264 + Opus,
  # démarrage à la première lecture WebRTC ; CPU VPS). Clé lecteur : llsq90-<base>, etc.
  "~^live/llsq90-(.+)$":
    runOnDemand: >-
      sh -c "exec ffmpeg -loglevel warning -hide_banner -rtsp_transport tcp -fflags +genpts
      -analyzeduration 8000000 -probesize 16000000
      -i rtsp://127.0.0.1:8554/live/ll-$G1
      -vf \"scale=trunc(iw*90/100/2)*2:trunc(ih*90/100/2)*2,format=yuv420p\"
      -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline -level 4.0
      -g 60 -keyint_min 30 -sc_threshold 0 -b:v 0 -crf 26
      -c:a libopus -b:a 96k -ar 48000 -ac 2
      -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/$MTX_PATH"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 25s
    runOnDemandCloseAfter: 15s

  "~^live/llsq80-(.+)$":
    runOnDemand: >-
      sh -c "exec ffmpeg -loglevel warning -hide_banner -rtsp_transport tcp -fflags +genpts
      -analyzeduration 8000000 -probesize 16000000
      -i rtsp://127.0.0.1:8554/live/ll-$G1
      -vf \"scale=trunc(iw*80/100/2)*2:trunc(ih*80/100/2)*2,format=yuv420p\"
      -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline -level 4.0
      -g 60 -keyint_min 30 -sc_threshold 0 -b:v 0 -crf 26
      -c:a libopus -b:a 96k -ar 48000 -ac 2
      -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/$MTX_PATH"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 25s
    runOnDemandCloseAfter: 15s

  "~^live/llsq70-(.+)$":
    runOnDemand: >-
      sh -c "exec ffmpeg -loglevel warning -hide_banner -rtsp_transport tcp -fflags +genpts
      -analyzeduration 8000000 -probesize 16000000
      -i rtsp://127.0.0.1:8554/live/ll-$G1
      -vf \"scale=trunc(iw*70/100/2)*2:trunc(ih*70/100/2)*2,format=yuv420p\"
      -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline -level 4.0
      -g 60 -keyint_min 30 -sc_threshold 0 -b:v 0 -crf 26
      -c:a libopus -b:a 96k -ar 48000 -ac 2
      -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/$MTX_PATH"
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 25s
    runOnDemandCloseAfter: 15s

  # Mode LATENCE : live/ll-<clé> → WebRTC son Opus sur webrtc/live/ll-<clé>.
  # Mode QUALITÉ : OBS publie live/hq-<clé> ; un relais ffmpeg crée live/hqc-<clé>
  # pour le muxer HLS (voir bloc ~^live/hq- ci-dessous).
  "~^live/ll-.+$":
    runOnReady: >-
      sh -c "sleep 3; exec ffmpeg -loglevel warning
      -rtsp_transport tcp
      -analyzeduration 15000000
      -probesize 50000000
      -i rtsp://127.0.0.1:8554/$MTX_PATH
      -map 0:v:0 -map 0:a:0
      -c:v copy
      -c:a libopus -b:a 128k -ar 48000
      -f rtsp -rtsp_transport tcp -flush_packets 1
      rtsp://127.0.0.1:8554/webrtc/$MTX_PATH"
    runOnReadyRestart: yes

  # Mode QUALITÉ : OBS publie toujours live/hq-<base>. Le muxer HLS peut rester bloqué
  # sur le flux SRT/x264 brut ; ffmpeg remuxe vers live/hqc-<base> (même codecs).
  # Préfixe « hqc » évite de matcher à nouveau ~^live/hq-… (regex Go sans lookahead).
  # Le player mode Qualité lit hqc-<base> (voir player/index.html).
  "~^live/hq-(.+)$":
    # Ne PAS lire le flux HQ en RTMP : MediaMTX coupe avec « too many reordered frames » (B-frames x264).
    # Lecture RTSP/TCP puis republication RTMP vers live/hqc-* — copy, pas de transcodage VPS.
    runOnReady: >-
      sh -c "sleep 4; while true; do
      ffmpeg -loglevel warning -hide_banner
      -rtsp_transport tcp
      -analyzeduration 15000000
      -probesize 50000000
      -fflags +genpts
      -i rtsp://127.0.0.1:8554/$MTX_PATH
      -map 0:v:0 -map 0:a:0 -c copy -bsf:a aac_adtstoasc
      -muxdelay 0 -muxpreload 0
      -f flv -flvflags no_duration_filesize
      rtmp://127.0.0.1:1935/live/hqc-$G1
      || true; sleep 2; done"
    runOnReadyRestart: yes

  all_others:
