<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Stream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --surface: #0e1117;
      --surface2: #151820;
      --border: rgba(255,255,255,.07);
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,.35);
      --red: #ff4560;
      --text: #e2e5f0;
      --muted: rgba(226,229,240,.45);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.6rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,17,23,.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: inherit;
    }

    .logo-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .6; transform: scale(.85); }
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      background: rgba(255,69,96,.15);
      color: var(--red);
      border: 1px solid rgba(255,69,96,.25);
    }

    .badge.offline {
      background: rgba(255,255,255,.05);
      color: var(--muted);
      border-color: var(--border);
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      gap: 1.25rem;
    }

    /* ── Player wrapper ── */
    .player-wrap {
      position: relative;
      width: min(98vw, 130rem);
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,.7);
    }

    video {
      display: block;
      width: 100%;
      max-height: 82vh;
      background: #000;
    }

    .player-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Controls panel ── */
    .panel {
      width: min(98vw, 130rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .panel label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      flex: 1;
      gap: 0.5rem;
      min-width: 0;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108,99,255,.3);
    }

    .btn-primary:hover {
      background: #7b73ff;
      box-shadow: 0 4px 20px rgba(108,99,255,.5);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    /* ── Status / error bar ── */
    .status-bar {
      width: min(98vw, 130rem);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: opacity .25s;
    }

    .status-bar.hidden { opacity: 0; pointer-events: none; }

    .status-bar.error {
      background: rgba(255,69,96,.08);
      border-color: rgba(255,69,96,.2);
      color: #ff7a91;
    }

    .status-bar.info {
      background: rgba(108,99,255,.08);
      border-color: rgba(108,99,255,.2);
      color: #a09bff;
    }

    /* ── Footer ── */
    footer {
      padding: 1rem 1.6rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">
      <span class="logo-dot" id="live-dot"></span>
      Live Stream
    </a>
    <span class="badge offline" id="live-badge">Hors ligne</span>
  </header>

  <main>
    <div class="player-wrap">
      <video id="v" controls playsinline></video>
      <div class="player-overlay"><div class="spinner" id="spinner"></div></div>
    </div>

    <div class="panel">
      <label for="key">Clé de stream</label>
      <div class="input-row">
        <input id="key" type="text" placeholder="ex : monStream2026xz" autocomplete="off" spellcheck="false" />
        <button type="button" class="btn btn-primary" id="go">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5a.5.5 0 0 1 .765-.424l10 5.5a.5.5 0 0 1 0 .848l-10 5.5A.5.5 0 0 1 3 13.5v-11Z"/></svg>
          Lancer
        </button>
      </div>
    </div>

    <div class="status-bar hidden" id="statusBar"></div>
  </main>

  <footer>stream.barium-saas.fr &mdash; flux HLS via OBS</footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
  <script>
    const video    = document.getElementById('v');
    const keyInput = document.getElementById('key');
    const statusBar = document.getElementById('statusBar');
    const spinner  = document.getElementById('spinner');
    const badge    = document.getElementById('live-badge');
    const dot      = document.getElementById('live-dot');
    let hls;

    function setStatus(type, text) {
      if (!text) { statusBar.className = 'status-bar hidden'; return; }
      statusBar.className = 'status-bar ' + type;
      statusBar.textContent = text;
    }

    function setLive(live) {
      badge.textContent = live ? 'En direct' : 'Hors ligne';
      badge.className   = live ? 'badge' : 'badge offline';
      dot.style.animationPlayState = live ? 'running' : 'paused';
      dot.style.background  = live ? 'var(--red)' : 'var(--muted)';
      dot.style.boxShadow   = live ? '0 0 8px var(--red)' : 'none';
    }

    function setLoading(v) { spinner.style.display = v ? 'block' : 'none'; }

    function absolutePlaylist(key) {
      return new URL('/hls/live/' + encodeURIComponent(key) + '/index.m3u8', location.origin).href;
    }

    function destroyHls() {
      if (hls) { hls.destroy(); hls = null; }
    }

    function play(key) {
      setStatus('');
      setLive(false);
      setLoading(true);
      destroyHls();
      const src = absolutePlaylist(key.trim());

      if (window.Hls && window.Hls.isSupported()) {
        hls = new window.Hls({ liveDurationInfinity: true, lowLatencyMode: false });
        hls.loadSource(src);
        hls.attachMedia(video);

        hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
          setLoading(false);
          setLive(true);
          setStatus('info', 'Flux chargé — lecture en cours.');
          video.play().catch(() => {});
        });

        hls.on(window.Hls.Events.ERROR, (_, data) => {
          if (data.fatal) {
            setLoading(false);
            setLive(false);
            setStatus('error', 'Flux indisponible ou clé incorrecte. Attends quelques secondes après le début de la diffusion dans OBS puis réessaie.');
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;
        video.addEventListener('canplay', () => { setLoading(false); setLive(true); }, { once: true });
        video.play().catch(() => {});
      } else {
        setLoading(false);
        setStatus('error', 'Navigateur incompatible avec HLS — essaie Safari ou Chrome récent.');
      }
    }

    document.getElementById('go').addEventListener('click', () => {
      const k = keyInput.value.trim();
      if (!k) { setStatus('error', 'Saisis une clé de stream.'); return; }
      history.replaceState(null, '', '?key=' + encodeURIComponent(k));
      play(k);
    });

    keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('go').click(); });

    const q = new URLSearchParams(location.search).get('key');
    if (q) { keyInput.value = q; play(q); }
  </script>
</body>
</html>
