# mediamtx v1.x — RTMP ingest → WebRTC (WHEP) + HLS fallback
# Les protocoles sont actifs par défaut ; pas de booléens enable/disable.

logLevel: info
logDestinations: [stdout]

# ── Adresses d'écoute ─────────────────────────────────────────────────────────
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889

# ── HLS ───────────────────────────────────────────────────────────────────────
hlsAllowOrigin: "*"
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms        # LL-HLS : fragments 200 ms

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAllowOrigin: "*"
# IP publique du VPS : nécessaire pour les ICE candidates
webrtcAdditionalHosts: [178.105.48.96]
# Port UDP fixe pour ICE (exposé dans docker-compose)
webrtcICEUDPMuxAddress: :8189

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  all_others:
