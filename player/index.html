<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Stream</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --surface: #0e1117;
      --surface2: #151820;
      --border: rgba(255,255,255,.07);
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,.35);
      --red: #ff4560;
      --text: #e2e5f0;
      --muted: rgba(226,229,240,.45);
      --radius: 12px;
      --crop-ar: 32/9;
      /* Calculée dynamiquement par JS */
      --chrome-h: 280px;
      /* Hauteur max du player (JS peut l'écraser via drag) */
      --player-max-h: calc(100svh - var(--chrome-h));
    }

    html { height: 100%; }
    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,17,23,.9);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-size: .95rem; font-weight: 600; letter-spacing: -.01em; text-decoration: none; color: inherit; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background .3s, box-shadow .3s; flex-shrink: 0; }
    .logo-dot.live { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }
    .badge { font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:.18rem .5rem; border-radius:20px; transition: all .3s; }
    .badge.offline { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
    .badge.online  { background:rgba(255,69,96,.15); color:var(--red); border:1px solid rgba(255,69,96,.25); }
    .mode-tag { font-size:.66rem; font-weight:600; padding:.16rem .48rem; border-radius:20px; border:1px solid var(--border); color:var(--muted); }
    .mode-tag.webrtc { background:rgba(108,99,255,.12); color:#a09bff; border-color:rgba(108,99,255,.2); }
    .mode-tag.hls    { background:rgba(255,180,0,.08); color:#ffc94d; border-color:rgba(255,180,0,.18); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.65rem 1rem 0.75rem;
      gap: 0.55rem;
      overflow-y: auto; /* scroll de secours si l'écran est minuscule */
    }

    /* ── Player outer ──────────────────────────────────────────────────────────
       L'aspect-ratio change via JS (--crop-ar).
       max-height empêche le débordement ; calculé dynamiquement par JS.
       Peut être étiré par le drag handle.
    ── */
    .player-outer {
      flex-shrink: 0;
      position: relative;
      width: min(98vw, 130rem);
      aspect-ratio: var(--crop-ar);
      max-height: var(--player-max-h);
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.65);
      cursor: default;
    }

    /* ── Crop wrapper ─────────────────────────────────────────────────────────
       Sert de zone de clip ; en plein écran il prend le ratio choisi et
       se centre dans le container fullscreen.
    ── */
    .crop-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .crop-wrapper video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      background: #000;
    }

    /* ── Fullscreen : player-outer remplit l'écran ; crop-wrapper se centre ── */
    .player-outer:fullscreen,
    .player-outer:-webkit-full-screen {
      width: 100% !important;
      height: 100% !important;
      max-height: none !important;
      aspect-ratio: auto !important;
      border-radius: 0 !important;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .player-outer:fullscreen .crop-wrapper,
    .player-outer:-webkit-full-screen .crop-wrapper {
      /* Prend le ratio du crop choisi, avec letterboxing si besoin */
      aspect-ratio: var(--crop-ar) !important;
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
    }

    .player-outer:fullscreen .crop-wrapper video,
    .player-outer:-webkit-full-screen .crop-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Bouton fullscreen custom (en haut à droite du player) */
    .btn-fs {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 4;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(8,10,15,.55);
      color: rgba(255,255,255,.7);
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s, background .15s;
      backdrop-filter: blur(4px);
    }
    .player-outer:hover .btn-fs { opacity: 1; }
    .btn-fs:hover { background: rgba(8,10,15,.85); color: #fff; }

    /* Masquer le bouton fullscreen natif du player vidéo */
    video::-webkit-media-controls-fullscreen-button { display: none !important; }

    /* ── Overlay loading ── */
    .player-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
      background: rgba(8,10,15,.78); transition: opacity .3s;
      pointer-events: none; z-index: 2;
    }
    .player-overlay.hidden { opacity: 0; }
    .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-label { font-size: .8rem; color: var(--muted); }

    /* ── Drag handle ── */
    .drag-handle {
      flex-shrink: 0;
      width: min(98vw, 130rem);
      height: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: ns-resize;
      color: var(--muted);
      transition: color .2s;
      user-select: none;
    }
    .drag-handle:hover { color: var(--accent); }
    .drag-handle svg { pointer-events: none; }

    /* ── Crop bar ── */
    .crop-bar {
      flex-shrink: 0;
      width: min(98vw, 130rem);
      display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap;
    }
    .crop-label { font-size: .7rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-right: .2rem; }
    .crop-btn {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .28rem .65rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); font-size: .76rem; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
    }
    .crop-btn:hover { background: #1e2230; color: var(--text); }
    .crop-btn.active { background: rgba(108,99,255,.18); border-color: var(--accent); color: #c0bbff; box-shadow: 0 0 0 2px var(--accent-glow); }
    .crop-icon { display: inline-block; border: 1.5px solid currentColor; border-radius: 2px; opacity: .8; flex-shrink: 0; }

    /* ── Panel clé ── */
    .panel {
      flex-shrink: 0;
      width: min(98vw, 130rem); background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: .8rem 1.1rem;
      display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
    }
    .panel label { font-size: .73rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .input-row { display: flex; flex: 1; gap: .45rem; min-width: 0; }
    input[type="text"] {
      flex: 1; min-width: 0; padding: .48rem .75rem;
      border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: .86rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input[type="text"]::placeholder { color: var(--muted); }
    .btn { display: inline-flex; align-items: center; gap: .35rem; padding: .48rem .95rem; border-radius: 7px; border: 1px solid transparent; font-size: .86rem; font-weight: 600; cursor: pointer; transition: background .15s, transform .1s, box-shadow .2s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 3px 12px rgba(108,99,255,.3); }
    .btn-primary:hover { background: #7b73ff; box-shadow: 0 3px 16px rgba(108,99,255,.5); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── Status bar ── */
    .status-bar { flex-shrink: 0; width: min(98vw, 130rem); font-size: .78rem; display: flex; align-items: center; gap: .45rem; padding: .45rem .8rem; border-radius: 7px; border: 1px solid transparent; transition: opacity .25s; }
    .status-bar.hidden { opacity: 0; pointer-events: none; height: 0; padding: 0; overflow: hidden; border: none; }
    .status-bar.error { background: rgba(255,69,96,.08); border-color: rgba(255,69,96,.2); color: #ff7a91; }
    .status-bar.info  { background: rgba(108,99,255,.08); border-color: rgba(108,99,255,.2); color: #a09bff; }

    /* ── Footer ── */
    footer { flex-shrink: 0; padding: .55rem 1.4rem; border-top: 1px solid var(--border); font-size: .7rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <span class="logo-dot" id="liveDot"></span>
    Live Stream
  </a>
  <div class="header-right">
    <span class="mode-tag" id="modeTag">—</span>
    <span class="badge offline" id="liveBadge">Hors ligne</span>
  </div>
</header>

<main id="main">
  <div class="player-outer" id="playerOuter">
    <!-- crop-wrapper : zone de clip ; en fullscreen il prend le ratio choisi -->
    <div class="crop-wrapper" id="cropWrapper">
      <video id="v" controls playsinline autoplay></video>
    </div>

    <div class="player-overlay" id="overlay">
      <div class="spinner"></div>
      <span class="overlay-label" id="overlayLabel">En attente du flux…</span>
    </div>

    <!-- Bouton fullscreen custom (respecte le crop) -->
    <button class="btn-fs" id="btnFs" title="Plein écran">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <!-- Handle de redimensionnement (drag vertical) -->
  <div class="drag-handle" id="dragHandle" title="Glisser pour redimensionner">
    <svg width="40" height="6" viewBox="0 0 40 6" fill="currentColor">
      <rect x="0" y="1" width="40" height="1.5" rx="1" opacity=".5"/>
      <rect x="0" y="3.5" width="40" height="1.5" rx="1" opacity=".5"/>
    </svg>
  </div>

  <div class="crop-bar">
    <span class="crop-label">Format</span>
    <button class="crop-btn active" data-w="32" data-h="9" title="Plein écran 32:9">
      <svg class="crop-icon" width="28" height="8" viewBox="0 0 28 8"><rect width="28" height="8" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/></svg>
      32:9
    </button>
    <button class="crop-btn" data-w="21" data-h="9" title="Ultrawide 21:9">
      <svg class="crop-icon" width="21" height="9" viewBox="0 0 21 9"><rect width="21" height="9" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/></svg>
      21:9
    </button>
    <button class="crop-btn" data-w="16" data-h="9" title="Standard 16:9">
      <svg class="crop-icon" width="16" height="9" viewBox="0 0 16 9"><rect width="16" height="9" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/></svg>
      16:9
    </button>
  </div>

  <div class="panel">
    <label for="key">Clé de stream</label>
    <div class="input-row">
      <input id="key" type="text" placeholder="ex : monStream2026xz" autocomplete="off" spellcheck="false" />
      <button type="button" class="btn btn-primary" id="go">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2.5a.5.5 0 0 1 .765-.424l10 5.5a.5.5 0 0 1 0 .848l-10 5.5A.5.5 0 0 1 3 13.5v-11Z"/></svg>
        Lancer
      </button>
    </div>
  </div>

  <div class="status-bar hidden" id="statusBar"></div>
</main>

<footer>stream.barium-saas.fr &mdash; WebRTC &lt;1 s · HLS fallback</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
<script>
(function () {
  const video       = document.getElementById('v');
  const keyInput    = document.getElementById('key');
  const statusBar   = document.getElementById('statusBar');
  const overlay     = document.getElementById('overlay');
  const overlayLbl  = document.getElementById('overlayLabel');
  const liveBadge   = document.getElementById('liveBadge');
  const liveDot     = document.getElementById('liveDot');
  const modeTag     = document.getElementById('modeTag');
  const playerOuter = document.getElementById('playerOuter');
  const cropWrapper = document.getElementById('cropWrapper');
  const root        = document.documentElement;

  let hlsInstance = null;
  let pc = null;

  // ── Hauteur chrome dynamique ──────────────────────────────────────────────
  // Calcule la place prise par tout sauf le player, met à jour --chrome-h.
  function updateChromeHeight() {
    const header     = document.querySelector('header').offsetHeight;
    const dragHandle = document.getElementById('dragHandle').offsetHeight;
    const cropBar    = document.querySelector('.crop-bar').offsetHeight;
    const panel      = document.querySelector('.panel').offsetHeight;
    const footer     = document.querySelector('footer').offsetHeight;
    // paddings main (top+bottom) + gaps (4 éléments × ~8px)
    const extra = 24 + 4 * 8;
    const chromeH = header + dragHandle + cropBar + panel + footer + extra;
    root.style.setProperty('--chrome-h', chromeH + 'px');
  }
  updateChromeHeight();
  window.addEventListener('resize', updateChromeHeight);

  // ── Crop ─────────────────────────────────────────────────────────────────
  document.querySelector('.crop-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.crop-btn');
    if (!btn) return;
    document.querySelectorAll('.crop-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    root.style.setProperty('--crop-ar', `${btn.dataset.w}/${btn.dataset.h}`);
  });

  // ── Drag to resize ───────────────────────────────────────────────────────
  const dragHandle = document.getElementById('dragHandle');
  let resizing = false, dragStartY, dragStartH;

  dragHandle.addEventListener('pointerdown', (e) => {
    resizing    = true;
    dragStartY  = e.clientY;
    dragStartH  = playerOuter.getBoundingClientRect().height;
    dragHandle.setPointerCapture(e.pointerId);
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  dragHandle.addEventListener('pointermove', (e) => {
    if (!resizing) return;
    const dy   = e.clientY - dragStartY;
    const newH = Math.max(80, dragStartH + dy);
    // Override --player-max-h pour dépasser ou réduire la limite auto
    root.style.setProperty('--player-max-h', newH + 'px');
  });

  dragHandle.addEventListener('pointerup', () => {
    resizing = false;
    document.body.style.userSelect = '';
  });

  // ── Fullscreen custom ────────────────────────────────────────────────────
  document.getElementById('btnFs').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      playerOuter.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });

  // Icône fullscreen/exit
  document.addEventListener('fullscreenchange', () => {
    const inFs  = !!document.fullscreenElement;
    const btnFs = document.getElementById('btnFs');
    btnFs.innerHTML = inFs
      ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`
      : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
  });

  // Si l'utilisateur utilise quand même le fullscreen natif de la vidéo, on redirige
  video.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement === video) {
      document.exitFullscreen().then(() => {
        playerOuter.requestFullscreen().catch(() => {});
      }).catch(() => {});
    }
  });

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(type, text) {
    if (!text) { statusBar.className = 'status-bar hidden'; return; }
    statusBar.className = 'status-bar ' + type;
    statusBar.textContent = text;
  }

  function setLive(live, mode) {
    liveBadge.textContent = live ? 'En direct' : 'Hors ligne';
    liveBadge.className   = live ? 'badge online' : 'badge offline';
    liveDot.className     = live ? 'logo-dot live' : 'logo-dot';
    modeTag.textContent   = mode || '—';
    modeTag.className     = 'mode-tag' + (mode === 'WebRTC' ? ' webrtc' : mode === 'HLS' ? ' hls' : '');
  }

  function showOverlay(label) { overlay.classList.remove('hidden'); overlayLbl.textContent = label || ''; }
  function hideOverlay()       { overlay.classList.add('hidden'); }

  // ── Cleanup ───────────────────────────────────────────────────────────────
  function stopAll() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (pc)          { pc.close();            pc = null; }
    video.srcObject = null;
    video.src = '';
    setLive(false, null);
  }

  // ── WebRTC / WHEP ─────────────────────────────────────────────────────────
  async function playWebRTC(key) {
    const whepUrl = '/live/' + encodeURIComponent(key) + '/whep';
    pc = new RTCPeerConnection({ iceServers: [] });
    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = (e) => {
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
        video.play().catch(() => {});
        hideOverlay();
        setLive(true, 'WebRTC');
        setStatus('info', 'WebRTC actif — latence <1 s.');
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (['disconnected', 'failed', 'closed'].includes(pc.iceConnectionState)) {
        setLive(false, null);
        setStatus('error', 'Connexion WebRTC perdue.');
        showOverlay('Connexion perdue…');
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await new Promise(resolve => {
      if (pc.iceGatheringState === 'complete') { resolve(); return; }
      pc.addEventListener('icegatheringstatechange', function h() {
        if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', h); resolve(); }
      });
      setTimeout(resolve, 2000);
    });

    const resp = await fetch(whepUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: pc.localDescription.sdp,
    });
    if (!resp.ok) throw new Error('WHEP ' + resp.status);
    await pc.setRemoteDescription({ type: 'answer', sdp: await resp.text() });
  }

  // ── HLS fallback ──────────────────────────────────────────────────────────
  function playHLS(key) {
    const src = '/hls/' + encodeURIComponent(key) + '/index.m3u8';
    if (window.Hls && window.Hls.isSupported()) {
      hlsInstance = new window.Hls({ liveDurationInfinity: true, lowLatencyMode: true, backBufferLength: 8, maxLiveSyncPlaybackRate: 1.1 });
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(video);
      hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
        hideOverlay(); setLive(true, 'HLS'); setStatus('info', 'HLS Low-Latency actif (~2 s).');
      });
      hlsInstance.on(window.Hls.Events.ERROR, (_, data) => {
        if (data.fatal) { setLive(false, null); setStatus('error', 'Flux HLS indisponible.'); showOverlay('Flux indisponible'); }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src; video.play().catch(() => {}); hideOverlay(); setLive(true, 'HLS');
    } else {
      setStatus('error', 'Navigateur incompatible. Essaie Chrome ou Safari.'); showOverlay('Navigateur incompatible');
    }
  }

  // ── Entrée principale ─────────────────────────────────────────────────────
  async function play(key) {
    stopAll(); setStatus(''); showOverlay('Connexion WebRTC…');
    try {
      await playWebRTC(key);
    } catch (err) {
      console.warn('WebRTC échoué, bascule HLS :', err);
      setStatus('info', 'WebRTC indisponible — bascule sur HLS (~2 s).');
      showOverlay('Bascule sur HLS…');
      if (pc) { pc.close(); pc = null; }
      playHLS(key);
    }
  }

  document.getElementById('go').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) { setStatus('error', 'Saisis une clé de stream.'); return; }
    history.replaceState(null, '', '?key=' + encodeURIComponent(k));
    play(k);
  });

  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('go').click(); });

  const q = new URLSearchParams(location.search).get('key');
  if (q) { keyInput.value = q; play(q); }
})();
</script>
</body>
</html>
