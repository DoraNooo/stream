# mediamtx v1.18+ — RTMP ingest → WebRTC (WHEP) + HLS fallback

logLevel: info
logDestinations: [stdout]

# ── Adresses d'écoute ─────────────────────────────────────────────────────────
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889

# ── HLS ───────────────────────────────────────────────────────────────────────
# mpegts + segments 2s : robuste pour les relais ffmpeg et les GOP OBS (keyframes 2s).
hlsAllowOrigins: ["*"]
hlsVariant: mpegts
hlsAlwaysRemux: false
hlsSegmentCount: 10
hlsSegmentDuration: 2s

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAllowOrigins: ["*"]
# IP publique du VPS — nécessaire pour les ICE candidates externes
webrtcAdditionalHosts: [178.105.48.96]
# Port UDP fixe pour ICE (exposé dans docker-compose + UFW)
webrtcLocalUDPAddress: :8189

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  # Mode LATENCE : live/ll-<clé> → WebRTC son Opus sur webrtc/live/ll-<clé>.
  # Mode QUALITÉ : OBS publie live/hq-<clé> ; un relais ffmpeg crée live/hqc-<clé>
  # pour le muxer HLS (voir bloc ~^live/hq- ci-dessous).
  "~^live/ll-.+$":
    runOnReady: >-
      sh -c "sleep 3; exec ffmpeg -loglevel warning
      -rtsp_transport tcp
      -analyzeduration 15000000
      -probesize 50000000
      -i rtsp://127.0.0.1:8554/$MTX_PATH
      -map 0:v:0 -map 0:a:0
      -c:v copy
      -c:a libopus -b:a 128k -ar 48000
      -f rtsp -rtsp_transport tcp -flush_packets 1
      rtsp://127.0.0.1:8554/webrtc/$MTX_PATH"
    runOnReadyRestart: yes

  # Mode QUALITÉ : OBS publie toujours live/hq-<base>. Le muxer HLS peut rester bloqué
  # sur le flux SRT/x264 brut ; ffmpeg remuxe vers live/hqc-<base> (même codecs).
  # Préfixe « hqc » évite de matcher à nouveau ~^live/hq-… (regex Go sans lookahead).
  # Le player mode Qualité lit hqc-<base> (voir player/index.html).
  "~^live/hq-(.+)$":
    # Micro-coupures / ffmpeg qui quitte → boucle de redémarrage ; rw_timeout en µs (120 s).
    runOnReady: >-
      sh -c "sleep 3; while true; do
      ffmpeg -loglevel warning -hide_banner
      -rw_timeout 120000000
      -rtmp_live live
      -rtmp_buffer 10000000
      -fflags +genpts+discardcorrupt -avoid_negative_ts make_zero
      -i rtmp://127.0.0.1:1935/$MTX_PATH
      -map 0:v:0 -map 0:a:0 -c copy -bsf:a aac_adtstoasc
      -muxdelay 0 -muxpreload 0
      -f flv -flvflags no_duration_filesize
      rtmp://127.0.0.1:1935/live/hqc-$G1
      || true; sleep 2; done"
    runOnReadyRestart: yes

  all_others:
