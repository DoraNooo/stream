services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    ports:
      - "1935:1935"              # RTMP ingest OBS
      - "127.0.0.1:8888:8888"   # HLS (fallback, proxié par Nginx host)
      - "127.0.0.1:8889:8889"   # WebRTC signaling WHEP (proxié par Nginx host)
      - "8189:8189/udp"         # WebRTC ICE UDP — joignable depuis Internet (pare-feu)
      - "8189:8189/tcp"         # WebRTC ICE TCP — souvent requis sur mobile si l’UDP est bloqué
      - "8890:8890/udp"         # SRT ingest OBS
    volumes:
      - ./deploy/mediamtx.yml:/mediamtx.yml:ro
