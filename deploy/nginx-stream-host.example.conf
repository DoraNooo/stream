# À inclure dans le Nginx du VPS (HTTPS + proxy vers le conteneur).
# Prérequis : DNS A stream.barium-saas.fr → IP du VPS ; Certbot pour ce hostname.
# Conteneur : docker compose up -d (HTTP HLS sur 127.0.0.1:8088, RTMP sur 1935).

server {
    listen 443 ssl http2;
    server_name stream.barium-saas.fr;

    # ssl_certificate /etc/letsencrypt/live/stream.barium-saas.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/stream.barium-saas.fr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/stream-player;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /hls/ {
        proxy_pass http://127.0.0.1:8088/hls/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }
}

server {
    listen 80;
    server_name stream.barium-saas.fr;
    return 301 https://$host$request_uri;
}
